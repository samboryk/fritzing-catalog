<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог Компонентів Fritzing</title>
    <style>
        :root {
            --bg-color: #f0f0f0; --text-color: #000; --card-bg: #fff;
            --border-color: #000; --accent-blue: #0055ff; --accent-red: #ff3333;
            --accent-yellow: #ffcc00; --border-width: 3px; --shadow-color: #000;
        }
        [data-theme="dark"] {
            --bg-color: #121212; --text-color: #fff; --card-bg: #1e1e1e;
            --border-color: #fff; --shadow-color: var(--accent-blue);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; transition: background 0.3s; overflow-x: hidden; }

        /* HEADER */
        header { background: var(--accent-yellow); padding: 3rem 1rem; border-bottom: var(--border-width) solid var(--border-color); text-align: center; position: relative; }
        [data-theme="dark"] header { background: #000; border-bottom-color: var(--accent-yellow); }
        .author-badge { display: inline-block; background: var(--text-color); color: var(--bg-color); padding: 0.5rem 1rem; font-weight: 900; border: var(--border-width) solid var(--border-color); box-shadow: 4px 4px 0px var(--accent-red); text-transform: uppercase; margin-bottom: 1rem; }
        h1 { margin: 0; font-size: 2rem; text-transform: uppercase; }

        /* CONTROLS */
        .controls { max-width: 900px; margin: 2rem auto; padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        .search-row { display: flex; gap: 10px; }
        input, select, .fav-toggle-main { padding: 14px; font-weight: bold; border: var(--border-width) solid var(--border-color); background: var(--card-bg); color: var(--text-color); box-shadow: 4px 4px 0px var(--border-color); outline: none; }
        input { flex: 2; } select { flex: 1; }
        .fav-toggle-main { cursor: pointer; min-width: 60px; font-size: 20px; transition: 0.2s; }
        .fav-toggle-main.active { background: var(--accent-red); color: #fff; }

        /* GRID & CARDS */
        main { max-width: 1400px; margin: 0 auto 3rem; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        
        .card { 
            background: var(--card-bg); border: var(--border-width) solid var(--border-color); 
            box-shadow: 5px 5px 0px var(--shadow-color); display: flex; flex-direction: column; 
            position: relative; opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s, box-shadow 0.2s; 
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-5px); box-shadow: 10px 10px 0px var(--shadow-color); }

        .fav-btn {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            background: #fff; border: 2px solid #000; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px;
            box-shadow: 2px 2px 0px #000; transition: transform 0.1s;
        }
        .fav-btn:active { transform: scale(0.8); }
        .fav-btn.is-active { color: var(--accent-red); }

        .card-image-wrapper { height: 200px; border-bottom: var(--border-width) solid var(--border-color); display: flex; align-items: center; justify-content: center; background: #fff; cursor: zoom-in; padding: 1rem; }
        .card-image-wrapper img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card-content { padding: 1rem; }
        .category-badge { display: inline-block; font-size: 0.7rem; font-weight: 800; background: var(--accent-blue); color: #fff; padding: 2px 8px; border: 2px solid #000; margin-bottom: 5px; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; }
        .modal-toolbar { display: flex; background: #000; padding: 5px; gap: 5px; }
        .modal-toolbar button { flex: 1; padding: 12px; font-weight: 900; cursor: pointer; border: 2px solid #000; }
        .modal-scroll-area { flex-grow: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-scroll-area img { background: #fff; border: 3px solid #000; width: 90%; max-width: 600px; transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1); }

        /* BACK TO TOP */
        #backToTop { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--accent-yellow); border: 3px solid #000; box-shadow: 4px 4px 0px #000; display: none; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 1000; }

        @media (max-width: 600px) {
            header { padding: 4rem 1rem 2rem; }
            .search-row { flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="imageModal" class="modal">
    <div class="modal-toolbar">
        <button onclick="zoomOut()">➖</button>
        <button onclick="zoomReset()">1:1</button>
        <button onclick="zoomIn()">➕</button>
        <button style="background:var(--accent-red); color:#fff;" onclick="forceCloseModal()">✖</button>
    </div>
    <div class="modal-scroll-area" id="scrollArea" onclick="closeModal(event)">
        <img id="zoomedImage" onclick="event.stopPropagation()"> 
    </div>
    <div id="zoomedTitle" style="background:#000; color:var(--accent-yellow); text-align:center; padding:10px; font-weight:bold; font-size:12px; text-transform:uppercase;"></div>
</div>

<button id="backToTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<header>
    <button id="themeBtn" style="position:absolute; top:10px; right:10px; padding:5px 10px; font-weight:900; cursor:pointer;" onclick="toggleTheme()">🌙</button>
    <div class="author-badge">Made by SAMBORYK</div>
    <h1>Каталог Деталей Fritzing</h1>
    <div class="controls">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Пошук за назвою..." oninput="render()">
            <select id="categoryFilter" onchange="render()"><option value="all">УСІ КАТЕГОРІЇ</option></select>
            <button id="favToggle" class="fav-toggle-main" onclick="toggleShowFavs()">❤️</button>
        </div>
    </div>
</header>

<main><div id="catalogGrid" class="grid"></div></main>

<script>
    let components = [];
    let favorites = JSON.parse(localStorage.getItem('fritzing_favs')) || [];
    let showOnlyFavs = false;
    let currentZoom = 90;

    // Звук кліку (Web Audio API)
    function playClickSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    // Вібрація
    function triggerHaptic() {
        if (navigator.vibrate) navigator.vibrate(20);
    }

    const setTheme = (t) => {
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
        document.getElementById("themeBtn").innerText = t === "light" ? "🌙" : "☀️";
    };
    setTheme(localStorage.getItem("theme") || "light");
    function toggleTheme() { setTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light"); }

    window.onscroll = () => { document.getElementById("backToTop").style.display = (window.pageYOffset > 400) ? "flex" : "none"; };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });

    fetch('catalog.json').then(res => res.json()).then(data => {
        components = data;
        const cats = [...new Set(data.map(i => i.category))].sort();
        cats.forEach(c => {
            const o = document.createElement("option"); o.value = o.innerText = c;
            document.getElementById("categoryFilter").appendChild(o);
        });
        render(true);
    });

    function toggleFav(id, btn, event) {
        event.stopPropagation();
        playClickSound();
        triggerHaptic();
        
        const idx = favorites.indexOf(id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(id);
        
        localStorage.setItem('fritzing_favs', JSON.stringify(favorites));
        
        // Оновлюємо тільки кнопку, а не всю сітку
        btn.classList.toggle('is-active');
        btn.innerText = favorites.includes(id) ? '❤️' : '🤍';
        
        if (showOnlyFavs) render(); // Якщо ми в режимі "Тільки обране", треба перерендерити
    }

    function toggleShowFavs() {
        showOnlyFavs = !showOnlyFavs;
        document.getElementById("favToggle").classList.toggle("active", showOnlyFavs);
        render(true);
    }

    function render(isNewQuery = false) {
        const s = document.getElementById("searchInput").value.toLowerCase();
        const c = document.getElementById("categoryFilter").value;
        const g = document.getElementById("catalogGrid");
        
        const filtered = components.filter(i => {
            const mS = i.title.toLowerCase().includes(s) || i.description.toLowerCase().includes(s);
            const mC = c === 'all' || i.category === c;
            const mF = !showOnlyFavs || favorites.includes(i.id);
            return mS && mC && mF;
        });

        g.innerHTML = filtered.length ? "" : '<div style="grid-column:1/-1; text-align:center; padding:50px; font-weight:bold;">ПОРОЖНЬО 🕵️‍♂️</div>';
        
        filtered.forEach((i, idx) => {
            const isF = favorites.includes(i.id);
            const card = document.createElement("div"); 
            card.className = "card";
            if (!isNewQuery) card.classList.add('visible'); // Не анімувати, якщо це не новий пошук

            const img = `images/${i.id}.svg`;
            card.innerHTML = `
                <button class="fav-btn ${isF ? 'is-active' : ''}" onclick="toggleFav('${i.id}', this, event)">${isF ? '❤️' : '🤍'}</button>
                <div class="card-image-wrapper" onclick="openModal('${img}', '${i.title.replace(/'/g, "\\'")}')">
                    <img src="${img}" loading="lazy" onerror="this.src='https://placehold.co/200/ffffff/000000?text=No+Img'">
                </div>
                <div class="card-content">
                    <div class="category-badge">${i.category}</div>
                    <h2 style="margin:0; font-size:1.1rem;">${i.title}</h2><p style="font-size:0.85rem; opacity:0.8;">${i.description}</p>
                </div>`;
            g.appendChild(card);
            if (isNewQuery) observer.observe(card);
        });
    }

    // Modal Zoom Logic
    const m = document.getElementById("imageModal"), zoomImg = document.getElementById("zoomedImage");
    function openModal(s, t) {
        m.style.display = "flex"; zoomImg.src = s; document.getElementById("zoomedTitle").innerText = t;
        currentZoom = window.innerWidth < 600 ? 90 : 60; applyZoom();
    }
    const forceCloseModal = () => m.style.display = "none";
    const closeModal = (e) => { if(e.target.id === "scrollArea") forceCloseModal(); };
    function applyZoom() { zoomImg.style.width = currentZoom + "%"; zoomImg.style.maxWidth = currentZoom > 100 ? "none" : "600px"; }
    function zoomIn() { currentZoom += 40; applyZoom(); }
    function zoomOut() { if(currentZoom > 40) currentZoom -= 40; applyZoom(); }
    function zoomReset() { currentZoom = (window.innerWidth < 600 ? 90 : 60); applyZoom(); }
</script>
</body>
</html>
