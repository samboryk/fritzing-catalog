<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог Компонентів Fritzing</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --text-color: #000000;
            --card-bg: #ffffff;
            --border-color: #000000;
            --accent-blue: #0055ff;
            --accent-red: #ff3333;
            --accent-yellow: #ffcc00;
            --border-width: 3px;
            --img-bg: #ffffff;
            --img-pattern: #d4d4d4;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --border-color: #ffffff;
            --accent-yellow: #eab308;
            --img-bg: #e5e5e5;
            --img-pattern: #a3a3a3;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; line-height: 1.5;
            overflow-x: hidden; /* Заборона горизонтального скролу сайту */
        }

        header {
            background-color: var(--accent-yellow);
            padding: 3rem 1rem;
            border-bottom: var(--border-width) solid var(--border-color);
            text-align: center;
            position: relative;
        }

        .author-badge {
            display: inline-block;
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 0.5rem 1rem;
            font-weight: 900;
            font-size: 0.9rem;
            border: var(--border-width) solid var(--border-color);
            box-shadow: 4px 4px 0px var(--accent-red);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 { margin: 0 0 1.5rem 0; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; }

        .theme-toggle-btn {
            position: absolute; top: 1rem; right: 1rem;
            background-color: var(--card-bg); color: var(--text-color);
            border: var(--border-width) solid var(--border-color);
            padding: 0.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 3px 3px 0px var(--border-color);
        }

        /* Кнопки завантаження */
        .download-zone {
            display: flex; justify-content: center; gap: 1rem;
            margin-bottom: 2rem; flex-wrap: wrap; padding: 0 1rem;
        }

        .dl-btn {
            padding: 0.8rem 1.2rem; font-weight: 900; text-decoration: none;
            text-transform: uppercase; border: var(--border-width) solid var(--border-color);
            color: #fff; box-shadow: 4px 4px 0px var(--border-color);
        }
        .dl-btn.fz { background-color: var(--accent-blue); }
        .dl-btn.pdf { background-color: var(--accent-red); }

        /* ПАНЕЛЬ КЕРУВАННЯ (ВИПРАВЛЕНО) */
        .controls {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; max-width: 900px; margin: 0 auto;
            padding: 0 10px; width: 100%;
        }

        input, select {
            padding: 12px; font-size: 16px; font-weight: bold;
            color: var(--text-color); border: var(--border-width) solid var(--border-color);
            background-color: var(--card-bg); box-shadow: 4px 4px 0px var(--border-color);
            width: 100%; max-width: 100%;
        }

        @media (min-width: 768px) {
            input { flex: 2; }
            select { flex: 1; }
            .controls { flex-wrap: nowrap; }
        }

        /* КАРТКИ */
        main { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }

        .card {
            background-color: var(--card-bg); border: var(--border-width) solid var(--border-color);
            box-shadow: 5px 5px 0px var(--border-color); display: flex; flex-direction: column;
        }

        .card-image-wrapper {
            height: 200px; background-color: var(--img-bg);
            border-bottom: var(--border-width) solid var(--border-color);
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            cursor: zoom-in;
        }
        .card-image-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-content { padding: 1rem; flex-grow: 1; }
        .category-badge {
            display: inline-block; font-size: 0.7rem; font-weight: 800;
            background-color: var(--accent-blue); color: #fff;
            padding: 0.2rem 0.5rem; border: 2px solid var(--border-color); margin-bottom: 0.5rem;
        }
        h2 { margin: 0 0 0.5rem 0; font-size: 1.1rem; font-weight: 800; }
        p { margin: 0; font-size: 0.9rem; }

        /* МОДАЛКА ЗУМУ (ВИПРАВЛЕНО АДАПТАЦІЮ КНОПОК) */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9);
            flex-direction: column;
        }

        .modal-toolbar {
            display: flex; flex-wrap: wrap; width: 100%;
            background-color: var(--border-color); padding: 5px; gap: 5px;
        }

        .modal-toolbar button {
            flex: 1; min-width: 80px; padding: 12px 5px;
            font-size: 14px; font-weight: 900; border: 2px solid #fff;
            background: #fff; cursor: pointer; text-transform: uppercase;
        }
        .modal-toolbar button.close-btn { background: var(--accent-red); color: #fff; }

        .modal-scroll-area { flex-grow: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .modal-scroll-area img {
            background: #fff; border: 3px solid #000; padding: 10px;
            transition: width 0.2s ease; width: 90%; max-width: 600px;
        }

        .modal-title { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 14px; font-weight: bold; }

        /* АДАПТАЦІЯ ДЛЯ ТЕЛЕФОНІВ */
        @media (max-width: 600px) {
            header { padding: 4rem 10px 2rem 10px; }
            h1 { font-size: 1.8rem; }
            .theme-toggle-btn { right: 50%; transform: translateX(50%); top: 0.5rem; width: 180px; }
            .grid { grid-template-columns: 1fr; }
            .dl-btn { width: 100%; text-align: center; font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="imageModal" class="modal">
    <div class="modal-toolbar">
        <button onclick="zoomOut()">➖</button>
        <button onclick="zoomReset()">1:1</button>
        <button onclick="zoomIn()">➕</button>
        <button class="close-btn" onclick="forceCloseModal()">✖</button>
    </div>
    <div class="modal-scroll-area" id="scrollArea" onclick="closeModal(event)">
        <img id="zoomedImage" onclick="event.stopPropagation()"> 
    </div>
    <div id="zoomedTitle" class="modal-title"></div>
</div>

<header>
    <button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙 Темна Тема</button>
    <div class="author-badge">Made by SAMBORYK</div>
    <h1>Каталог Деталей</h1>
    
    <div class="download-zone">
        <a href="All_Components_Organized.fz" class="dl-btn fz" download>💾 .FZ</a>
        <a href="Catalog.pdf" class="dl-btn pdf" download>📄 PDF</a>
    </div>

    <div class="controls">
        <select id="categoryFilter"><option value="all">УСІ КАТЕГОРІЇ</option></select>
        <input type="text" id="searchInput" placeholder="Пошук...">
    </div>
</header>

<main><div id="catalogGrid" class="grid"></div></main>

<script>
    let components = [];
    let currentZoom = 90; 

    // Тема
    const setTheme = (t) => {
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
        document.getElementById("themeBtn").innerText = t === "light" ? "🌙 Темна Тема" : "☀️ Світла Тема";
    };
    setTheme(localStorage.getItem("theme") || "light");
    const toggleTheme = () => setTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");

    // Завантаження даних
    fetch('catalog.json').then(res => res.json()).then(data => {
        components = data;
        const cats = [...new Set(data.map(i => i.category))].sort();
        cats.forEach(c => {
            const o = document.createElement("option"); o.value = o.innerText = c;
            document.getElementById("categoryFilter").appendChild(o);
        });
        render(data);
    });

    function render(items) {
        const g = document.getElementById("catalogGrid");
        g.innerHTML = items.length ? "" : '<div class="empty-state">Нічого не знайдено</div>';
        items.forEach(i => {
            const c = document.createElement("div"); c.className = "card";
            const img = `images/${i.id}.svg`;
            c.innerHTML = `
                <div class="card-image-wrapper" onclick="openModal('${img}', '${i.title}')">
                    <img src="${img}" loading="lazy" onerror="this.src='https://placehold.co/200?text=No+Img'">
                </div>
                <div class="card-content">
                    <div class="category-badge">${i.category}</div>
                    <h2>${i.title}</h2><p>${i.description}</p>
                </div>`;
            g.appendChild(c);
        });
    }

    function filter() {
        const s = document.getElementById("searchInput").value.toLowerCase();
        const c = document.getElementById("categoryFilter").value;
        render(components.filter(i => (i.title.toLowerCase().includes(s) || i.description.toLowerCase().includes(s)) && (c === 'all' || i.category === c)));
    }
    document.getElementById("searchInput").oninput = filter;
    document.getElementById("categoryFilter").onchange = filter;

    // Модалка
    const m = document.getElementById("imageModal"), img = document.getElementById("zoomedImage");
    function openModal(s, t) {
        m.style.display = "flex"; img.src = s; document.getElementById("zoomedTitle").innerText = t;
        currentZoom = window.innerWidth < 600 ? 90 : 60; applyZoom();
    }
    const forceCloseModal = () => m.style.display = "none";
    const closeModal = (e) => { if(e.target.id === "scrollArea") forceCloseModal(); };
    
    function applyZoom() {
        img.style.width = currentZoom + "%";
        img.style.maxWidth = currentZoom > 100 ? "none" : "600px";
    }
    function zoomIn() { currentZoom += 40; applyZoom(); }
    function zoomOut() { if(currentZoom > 40) currentZoom -= 40; applyZoom(); }
    function zoomReset() { currentZoom = 90; applyZoom(); }
</script>
</body>
</html>
